name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Switch to main branch
        run: |
          git fetch origin main
          git checkout main

      - name: Validate tag version matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $PKG_VERSION"

      - name: Sync plugin.json version (prebuild)
        run: npm run prebuild

      - name: Update plugin.json download_url
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ENTRY_PATH=$(node -p "require('./plugin.json').entryPath")
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('plugin.json','utf8'));
            m.download_url = 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$ENTRY_PATH.jsplugin.zip';
            fs.writeFileSync('plugin.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "download_url updated for v$VERSION"

      - name: Commit plugin.json back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugin.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: update download_url for ${{ github.ref_name }} [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Get package info
        id: info
        run: |
          ENTRY_PATH=$(node -p "require('./plugin.json').entryPath")
          echo "entry_path=$ENTRY_PATH" >> $GITHUB_OUTPUT
          echo "zip_name=$ENTRY_PATH.jsplugin.zip" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "dist/${{ steps.info.outputs.zip_name }}" \
            "dist/_build/plugin.json#Plugin Manifest"
