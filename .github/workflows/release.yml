name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Get package info
        id: info
        run: |
          ENTRY_PATH=$(node -p "require('./plugin.json').entryPath")
          echo "entry_path=$ENTRY_PATH" >> $GITHUB_OUTPUT
          echo "zip_name=$ENTRY_PATH.jsplugin.zip" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "dist/${{ steps.info.outputs.zip_name }}" \
            "dist/_build/plugin.json#Plugin Manifest"
